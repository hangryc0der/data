name: Fetch India OFF Products (English, recently modified) via API

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: write

jobs:
  fetch-india-products:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Write fetch script
        run: |
          cat <<'EOF' > fetch_india_products.py
          import csv
          import sys
          import time
          from datetime import datetime, timezone
          import requests

          BASE_URL = "https://in.openfoodfacts.org/api/v2/search"

          # Only fetch products modified after this timestamp
          CUTOFF_ISO = "2026-05-26T08:33:54Z"
          CUTOFF_T = int(datetime.strptime(CUTOFF_ISO, "%Y-%m-%dT%H:%M:%SZ").replace(tzinfo=timezone.utc).timestamp())

          REQUEST_FIELDS = [
              "code", "product_name_en", "brands", "categories",
              "nutriments", "nova_group", "nutriscore_grade",
              "ingredients_text_en", "url", "last_modified_t",
          ]

          OUTPUT_FIELDS = [
              "code", "product_name", "brands", "categories",
              "energy-kcal_100g", "carbohydrates_100g", "sugars_100g", "fiber_100g",
              "proteins_100g", "fat_100g", "saturated-fat_100g", "salt_100g",
              "nova_group", "nutriscore_grade", "ingredients_text", "url",
              "last_modified_datetime",
          ]

          NUTRIMENT_KEYS = [
              "energy-kcal_100g", "carbohydrates_100g", "sugars_100g", "fiber_100g",
              "proteins_100g", "fat_100g", "saturated-fat_100g", "salt_100g",
          ]

          HEADERS = {
              "User-Agent": "IndiaProductsFetcher/1.0 (contact: your-email@example.com; +https://github.com/angryc0der/data)"
          }

          PAGE_SIZE = 250
          DELAY_BETWEEN_PAGES = 3
          OUTPUT_FILE = "india_products.csv"


          def fetch_page(page):
              params = {
                  "fields": ",".join(REQUEST_FIELDS),
                  "page_size": PAGE_SIZE,
                  "page": page,
                  "sort_by": "last_modified_t",
              }
              for attempt in range(6):
                  resp = requests.get(BASE_URL, params=params, headers=HEADERS, timeout=60)
                  if resp.status_code == 200:
                      return resp.json()
                  if resp.status_code in (401, 429, 503):
                      wait = 10 * (attempt + 1)
                      print(f"Blocked/rate-limited (HTTP {resp.status_code}) on page {page}, waiting {wait}s (attempt {attempt+1}/6)...", file=sys.stderr)
                      time.sleep(wait)
                      continue
                  resp.raise_for_status()
              raise RuntimeError(f"Failed to fetch page {page} after retries")


          def to_iso(ts):
              if not ts:
                  return ""
              try:
                  return datetime.fromtimestamp(int(ts), tz=timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
              except (ValueError, TypeError):
                  return ""


          def main():
              seen_codes = set()
              rows_written = 0
              page = 1
              sort_direction_confirmed = None  # True = descending (newest first)

              with open(OUTPUT_FILE, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=OUTPUT_FIELDS)
                  writer.writeheader()

                  while True:
                      data = fetch_page(page)
                      products = data.get("products", [])
                      if not products:
                          print("No more products returned, stopping.")
                          break

                      # confirm sort direction using the first page
                      if sort_direction_confirmed is None and len(products) >= 2:
                          first_t = products[0].get("last_modified_t", 0) or 0
                          last_t = products[-1].get("last_modified_t", 0) or 0
                          sort_direction_confirmed = first_t >= last_t
                          direction = "descending (newest first)" if sort_direction_confirmed else "ascending (oldest first)"
                          print(f"Detected sort order: {direction}")

                      page_min_t = None
                      for p in products:
                          ts = p.get("last_modified_t")
                          ts_int = int(ts) if ts else 0
                          if page_min_t is None or ts_int < page_min_t:
                              page_min_t = ts_int

                          # safety-net filter: only keep rows actually after the cutoff
                          if ts_int < CUTOFF_T:
                              continue

                          code = (p.get("code") or "").strip()
                          name = (p.get("product_name_en") or "").strip()
                          if not code or not name or code in seen_codes:
                              continue
                          seen_codes.add(code)

                          nutriments = p.get("nutriments") or {}
                          row = {
                              "code": code,
                              "product_name": name,
                              "brands": p.get("brands", ""),
                              "categories": p.get("categories", ""),
                              "nova_group": p.get("nova_group", ""),
                              "nutriscore_grade": p.get("nutriscore_grade", ""),
                              "ingredients_text": (p.get("ingredients_text_en") or "").strip(),
                              "url": p.get("url") or f"https://world.openfoodfacts.org/product/{code}",
                              "last_modified_datetime": to_iso(ts),
                          }
                          for key in NUTRIMENT_KEYS:
                              row[key] = nutriments.get(key, "")

                          writer.writerow(row)
                          rows_written += 1

                      f.flush()
                      print(f"Page {page}: fetched {len(products)} products, total matching written so far: {rows_written}")

                      # Early exit: if sorted newest-first and this whole page is already
                      # older than the cutoff, every subsequent page will be too — stop.
                      if sort_direction_confirmed and page_min_t is not None and page_min_t < CUTOFF_T:
                          all_older = all((p.get("last_modified_t") or 0) < CUTOFF_T for p in products)
                          if all_older:
                              print(f"Reached products older than cutoff ({CUTOFF_ISO}) on page {page}, stopping early.")
                              break

                      if len(products) < PAGE_SIZE:
                          break

                      page += 1
                      time.sleep(DELAY_BETWEEN_PAGES)

              print(f"Done. Total rows written: {rows_written}")


          if __name__ == "__main__":
              main()
          EOF

      - name: Run fetch script
        run: python fetch_india_products.py

      - name: Upload CSV as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: india-products-csv
          path: india_products.csv
          retention-days: 30

      - name: Commit CSV back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add india_products.csv
          git diff --cached --quiet || git commit -m "Update India OFF products data ($(date -u +%Y-%m-%d))"
          git push
