name: Fetch India OFF Products (English) via API

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: write

jobs:
  fetch-india-products:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Write fetch script
        run: |
          cat <<'EOF' > fetch_india_products.py
          import csv
          import sys
          import time
          import math
          from datetime import datetime, timezone
          import requests

          BASE_URL = "https://in.openfoodfacts.org/api/v2/search"

          REQUEST_FIELDS = [
              "code", "product_name_en", "brands", "categories",
              "nutriments", "nova_group", "nutriscore_grade",
              "ingredients_text_en", "url", "last_modified_t",
          ]

          OUTPUT_FIELDS = [
              "code", "product_name", "brands", "categories",
              "energy-kcal_100g", "carbohydrates_100g", "sugars_100g", "fiber_100g",
              "proteins_100g", "fat_100g", "saturated-fat_100g", "salt_100g",
              "nova_group", "nutriscore_grade", "ingredients_text", "url",
              "last_modified_datetime",
          ]

          NUTRIMENT_KEYS = [
              "energy-kcal_100g", "carbohydrates_100g", "sugars_100g", "fiber_100g",
              "proteins_100g", "fat_100g", "saturated-fat_100g", "salt_100g",
          ]

          HEADERS = {
              "User-Agent": "IndiaProductsFetcher/1.0 (contact: angrycoder@gmail.com; +https://github.com/angrycoder/data)"
          }

          PAGE_SIZE = 250          # smaller pages, less burst-like
          DELAY_BETWEEN_PAGES = 3  # seconds
          OUTPUT_FILE = "india_products.csv"


          def fetch_page(page):
              params = {
                  "fields": ",".join(REQUEST_FIELDS),
                  "page_size": PAGE_SIZE,
                  "page": page,
              }
              for attempt in range(6):
                  resp = requests.get(BASE_URL, params=params, headers=HEADERS, timeout=60)
                  if resp.status_code == 200:
                      return resp.json()
                  if resp.status_code in (401, 429, 503):
                      wait = 10 * (attempt + 1)
                      print(f"Blocked/rate-limited (HTTP {resp.status_code}) on page {page}, waiting {wait}s (attempt {attempt+1}/6)...", file=sys.stderr)
                      time.sleep(wait)
                      continue
                  resp.raise_for_status()
              raise RuntimeError(f"Failed to fetch page {page} after retries")


          def to_iso(ts):
              if not ts:
                  return ""
              try:
                  return datetime.fromtimestamp(int(ts), tz=timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
              except (ValueError, TypeError):
                  return ""


          def main():
              seen_codes = set()
              rows_written = 0

              first = fetch_page(1)
              total_count = first.get("count", 0)
              total_pages = max(1, math.ceil(total_count / PAGE_SIZE))
              print(f"Total matching products reported by API: {total_count} across {total_pages} page(s)")

              with open(OUTPUT_FILE, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=OUTPUT_FIELDS)
                  writer.writeheader()

                  page = 1
                  data = first
                  while True:
                      products = data.get("products", [])
                      if not products:
                          break

                      for p in products:
                          code = (p.get("code") or "").strip()
                          name = (p.get("product_name_en") or "").strip()
                          if not code or not name or code in seen_codes:
                              continue
                          seen_codes.add(code)

                          nutriments = p.get("nutriments") or {}
                          row = {
                              "code": code,
                              "product_name": name,
                              "brands": p.get("brands", ""),
                              "categories": p.get("categories", ""),
                              "nova_group": p.get("nova_group", ""),
                              "nutriscore_grade": p.get("nutriscore_grade", ""),
                              "ingredients_text": (p.get("ingredients_text_en") or "").strip(),
                              "url": p.get("url") or f"https://world.openfoodfacts.org/product/{code}",
                              "last_modified_datetime": to_iso(p.get("last_modified_t")),
                          }
                          for key in NUTRIMENT_KEYS:
                              row[key] = nutriments.get(key, "")

                          writer.writerow(row)
                          rows_written += 1

                      f.flush()
                      print(f"Page {page}/{total_pages}: fetched {len(products)} products, total written so far: {rows_written}")

                      page += 1
                      if page > total_pages:
                          break
                      time.sleep(DELAY_BETWEEN_PAGES)
                      data = fetch_page(page)

              print(f"Done. Total rows written: {rows_written}")


          if __name__ == "__main__":
              main()
          EOF

      - name: Run fetch script
        run: python fetch_india_products.py

      - name: Upload CSV as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: india-products-csv
          path: india_products.csv
          retention-days: 30

      - name: Commit CSV back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add india_products.csv
          git diff --cached --quiet || git commit -m "Update India OFF products data ($(date -u +%Y-%m-%d))"
          git push
